<!DOCTYPE html>
<html>
<head>
    <title>Upload Dataset</title>
    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Upload Athlete Dataset</h1>

    <form method="POST"
    enctype="multipart/form-data">

        <input
            type="file"
            name="dataset"
            accept=".csv"
            required
        >

        <br><br>

        <button type="submit">
            Upload Dataset
        </button>

    </form>

    <br>

    <a href="/dashboard">
        <button>
            Back
        </button>
    </a>

</div>

</body>
</html>
